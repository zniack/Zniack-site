<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zniack | Editor de Vídeo Alta Demanda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400&family=Raleway:wght@100&family=Roboto:wght@100;300;400;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Skyer';
            src: url('skyer.otf') format('opentype'), url('skyer.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #252525;
            --text-main: #d9d9d9;
            --text-light: #f3f3f3;
            --text-sub: #e3e3e3;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: white; font-family: 'Roboto', sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        .noise::after {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.01; pointer-events: none; z-index: 9998; animation: noiseAnim 0.2s steps(2) infinite;
        }
        @keyframes noiseAnim {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            100% { transform: translate(0, 0); }
        }

        /* AJUSTE 1: Header sempre visível e fixo */
        .header-sticky {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 30px 10%;
            z-index: 100;
            background: rgba(37, 37, 37, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 3rem;
            transition: background 0.3s ease;
        }

        section {
            min-height: 100vh; padding: 20vh 10%; 
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
        }

        #capa { height: 100vh; padding: 0; justify-content: center; }
        .capa-img-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0; transition: opacity 1s ease; }

        .portfolio-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color); z-index: 90; 
            overflow-y: auto; padding: 120px 10% 10vh 10%;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        }
        .portfolio-modal.active { opacity: 1; visibility: visible; }

        .category-nav { display: flex; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .category-nav-btn {
            font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08); padding: 6px 14px;
            cursor: pointer; transition: all 0.2s ease; background: none;
        }
        .category-nav-btn.active-cat { color: white; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }

        .fade-up { opacity: 0; transform: translateY(30px); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .fade-up.is-visible { opacity: 1; transform: translateY(0); }

        /* Carousel Styles */
        .carousel-wrapper { position: relative; width: 100%; overflow: hidden; min-height: 200px; display: flex; align-items: center; }
        .carousel-track { display: flex; gap: 15px; align-items: center; width: max-content; will-change: transform; height: 180px; }
        .carousel-item {
            flex: 0 0 auto; width: 140px; height: 79px; position: relative;
            border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden;
            cursor: pointer; opacity: 0.7; transition: all 0.4s ease;
        }
        .carousel-item.active { width: 320px; height: 180px; opacity: 1; border-color: rgba(255,255,255,0.3); }
        .carousel-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        #transition-overlay { display: none; position: fixed; inset: 0; background: var(--bg-color); z-index: 10000; opacity: 0; transition: opacity 0.2s ease; }

        @media (max-width: 768px) {
            .header-sticky { gap: 1rem; padding: 20px 5%; justify-content: center; font-size: 12px; }
            .carousel-item { width: 110px; height: 62px; }
            .carousel-item.active { width: 240px; height: 135px; }
        }
    </style>
</head>
<body class="noise">

    <div id="transition-overlay"></div>

    <header id="sticky-header" class="header-sticky">
        <a href="#sobre" class="nav-link font-['Oswald'] tracking-[4px] uppercase text-white/70 hover:text-white transition">Quem sou eu</a>
        <a href="#trabalho" class="nav-link font-['Oswald'] tracking-[4px] uppercase text-white/70 hover:text-white transition">Como trabalho</a>
        <a href="#portfolio" class="nav-link font-['Oswald'] tracking-[4px] uppercase text-white/70 hover:text-white transition">Portfolio</a>
        <a href="#contato" class="nav-link font-['Oswald'] tracking-[4px] uppercase text-white/70 hover:text-white transition">Contato</a>
    </header>

    <main class="snap-container">
        <section id="capa">
            <img src="capa.jpg" alt="Zniack" class="capa-img-full">
        </section>

        <section id="sobre">
            <div class="fade-up">
                <h2 class="font-['Oswald'] text-lg tracking-[7px] mb-8">QUEM SOU EU</h2>
                <p class="text-white/70 max-w-xl leading-relaxed">Editor de vídeo com 3+ anos de experiência, focado em operações de alta demanda e 800+ projetos entregues.</p>
            </div>
        </section>

        <section id="portfolio">
            <div class="fade-up">
                <h2 class="font-['Oswald'] text-lg tracking-[7px] mb-8">PORTFOLIO</h2>
                <div class="flex flex-col gap-4">
                    <button onclick="openCategory('Vídeos Diários')" class="text-left font-['Oswald'] tracking-[4px] py-4 border-b border-white/10 hover:pl-4 transition-all">VÍDEOS DIÁRIOS</button>
                    <button onclick="openCategory('Highlights')" class="text-left font-['Oswald'] tracking-[4px] py-4 border-b border-white/10 hover:pl-4 transition-all">HIGHLIGHTS</button>
                </div>
            </div>
        </section>
        
        <section id="contato" class="h-screen">
             <h2 class="font-['Oswald'] text-lg tracking-[7px] mb-8">CONTATO</h2>
        </section>
    </main>

    <div id="portfolio-view" class="portfolio-modal">
        <div class="category-nav" id="category-nav">
            <button class="category-nav-btn" onclick="openCategory('Vídeos Diários')">Vídeos Diários</button>
            <button class="category-nav-btn" onclick="openCategory('Highlights')">Highlights</button>
        </div>
        <div id="portfolio-content-area"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const stickyHeader = document.getElementById('sticky-header');
        const view = document.getElementById('portfolio-view');
        const contentArea = document.getElementById('portfolio-content-area');
        const carouselState = {};

        // Dados fictícios para o exemplo rodar
        const carouselData = { 'analises-vol': ['wELUjsyy5-8','lKtjZ5iy3WM','QrmMlRYB4Lo'] };

        // Header Fixa
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                stickyHeader.style.background = "rgba(25, 25, 25, 0.95)";
            } else {
                stickyHeader.style.background = "rgba(37, 37, 37, 0.8)";
            }
        });

        // Transição Global
        function triggerTransition(callback) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.display = 'block';
            requestAnimationFrame(() => {
                overlay.style.opacity = '1';
                setTimeout(() => {
                    callback();
                    setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 200); }, 50);
                }, 200);
            });
        }

        // Navegação Global
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                triggerTransition(() => {
                    view.classList.remove('active');
                    document.body.style.overflow = '';
                    window.scrollTo({ top: target.offsetTop, behavior: 'auto' });
                });
            });
        });

        function buildCarousel(id) {
            const items = (carouselData[id] || []).map(vid => `
                <div class="carousel-item" data-vid="${vid}" onclick="handleCarouselClick(this,'${id}')">
                    <img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg">
                </div>
            `).join('');
            return `
                <div class="vitrine-section relative group">
                    <button class="absolute left-[-40px] top-1/2 -translate-y-1/2 z-20 opacity-0 group-hover:opacity-100 transition-all" onclick="scrollCarouselLeft('${id}', event)">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <div class="carousel-wrapper"><div class="carousel-track" id="track-${id}">${items + items}</div></div>
                </div>`;
        }

        // AJUSTE 2: Seta funcional mesmo com vídeo ativo
        window.scrollCarouselLeft = function(id, event) {
            event.stopPropagation();
            const state = carouselState[id];
            if (state) {
                // Se houver vídeo ativo, reseta o estado de "alvo" para permitir movimento suave
                if (state.targetEl) {
                    state.isClosing = true;
                    state.isSlidingToItem = false;
                }
                state.currentSpeed = -30; // Impulso para a esquerda
            }
        };

        function startTicker(id) {
            const state = carouselState[id];
            function tick() {
                const track = state.track;
                const items = Array.from(track.children);
                const halfWidth = items[items.length/2].offsetLeft;

                if (!state.isPaused || state.isClosing) {
                    state.pos -= state.currentSpeed;
                    state.currentSpeed += (0.7 - state.currentSpeed) * 0.05; // Retorna à velocidade base
                    
                    if (state.pos <= -halfWidth) state.pos += halfWidth;
                    if (state.pos > 0) state.pos -= halfWidth;
                }

                // Lógica de crescimento do item central (UX padrão)
                if (state.isSlidingToItem && state.targetEl) {
                    const targetX = -state.targetEl.offsetLeft + (track.parentElement.offsetWidth/2 - 160);
                    state.pos += (targetX - state.pos) * 0.1;
                }

                track.style.transform = `translate3d(${state.pos}px, 0, 0)`;
                state.rafId = requestAnimationFrame(tick);
            }
            state.rafId = requestAnimationFrame(tick);
        }

        function openCategory(name) {
            triggerTransition(() => {
                view.classList.add('active');
                document.body.style.overflow = 'hidden';
                contentArea.innerHTML = name === 'Vídeos Diários' ? buildCarousel('analises-vol') : '<p class="p-10">Conteúdo em breve...</p>';
                
                // Inicializa o estado do carrossel após injetar no DOM
                const track = document.getElementById('track-analises-vol');
                if (track) {
                    carouselState['analises-vol'] = { track, pos: 0, currentSpeed: 0.7, isPaused: false };
                    startTicker('analises-vol');
                }
            });
        }

        function handleCarouselClick(el, id) {
            const state = carouselState[id];
            state.isPaused = true;
            state.isSlidingToItem = true;
            state.isClosing = false;
            state.targetEl = el;
            Array.from(state.track.children).forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // Revelar imagem da capa
        const img = document.querySelector('.capa-img-full');
        img.onload = () => img.style.opacity = 1;
        if (img.complete) img.onload();

        // Observer para Fade
        const obs = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('is-visible')), { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
    </script>
</body>
</html>
